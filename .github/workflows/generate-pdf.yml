name: Generate Nu-Link3-Pro Manual PDF (Pandoc)

on:
  push:
    branches: [ main ]
    paths:
      - 'Documents/Nu-Link3-Pro_User_Manual/**/*.md'
  workflow_dispatch: 

jobs:
  build-pdf-pandoc:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安裝 Pandoc, LaTeX 引擎 (XeTeX) 以及思源黑體中文字型
      - name: Install Pandoc & LaTeX & CJK Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra
          sudo apt-get install -y fonts-noto-cjk

      # 轉換 Markdown 為 PDF
      - name: Convert with Pandoc
        run: |
          cd Documents/Nu-Link3-Pro_User_Manual
          
          # 找出所有 .md 檔案並依字母順序排列
          FILES=$(find . -type f -name "*.md" | sort)
          
          # 執行 Pandoc 轉換
          # --pdf-engine=xelatex：指定支援 Unicode 的引擎
          # -V CJKmainfont：指定中文字體，解決中文亂碼問題
          # --toc：自動在第一頁生成可點擊的目錄
          # --number-sections：自動為標題加上 1.1, 1.2 等編號
          # -V geometry:margin=1in：設定邊距
          pandoc $FILES \
            -o ../../Nu-Link3-Pro_User_Manual.pdf \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK TC" \
            -V geometry:margin=1in \
            --toc \
            --number-sections

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nu-Link3-Pro_User_Manual_Pandoc
          path: Nu-Link3-Pro_User_Manual.pdf
