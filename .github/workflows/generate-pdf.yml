name: Generate Nu-Link3-Pro Manual PDF (Pandoc)

on:
  push:
    branches: [ main ]
    paths:
      - 'Documents/Nu-Link3-Pro_User_Manual/**/*.md'
  workflow_dispatch: 

jobs:
  build-pdf-pandoc:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX & CJK Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-chinese
          sudo apt-get install -y fonts-noto-cjk fonts-dejavu
          
      # 2. 轉換區塊
      - name: Convert with Pandoc
        run: |
          cd Documents/Nu-Link3-Pro_User_Manual
          
          # 抓取 docs 資料夾
          FILES=$(find docs -type f -name "*.md" | sort)
          
          # 【關鍵修正】：將所有指令寫在同一行，徹底避免換行空白 Bug！
          # 並且加入了 -V mainfont="DejaVu Sans" 來解決特殊符號消失的問題
          cat $FILES | sed -E 's|(\.\./)+media|media|g' | pandoc -o ../../Nu-Link3-Pro_User_Manual.pdf --pdf-engine=xelatex -V mainfont="DejaVu Sans" -V CJKmainfont="Noto Sans CJK TC" -V geometry:margin=1in --toc --number-sections --resource-path=.:..:../..:../../.. --include-before-body=cover.tex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nu-Link3-Pro_User_Manual_Pandoc
          path: Nu-Link3-Pro_User_Manual.pdf
