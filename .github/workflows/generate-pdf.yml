name: Generate Nu-Link3-Pro Manual PDF

# 設定觸發條件：當推送到 main 分支，或是手動點擊執行時觸發
on:
  push:
    branches: [ main ]
    paths:
      - 'Documents/Nu-Link3-Pro_User_Manual/**/*.md'
  workflow_dispatch: 

jobs:
  build-pdf:
    runs-on: ubuntu-22.04 # ⭐️ 關鍵修改：從 ubuntu-latest 退回 ubuntu-22.04
    steps:
      # 1. 取得儲存庫的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安裝 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安裝 Markdown 轉 PDF 的開源工具
      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      # 4. 遞迴合併與轉換
      - name: Merge and Convert Markdown to PDF
        run: |
          cd Documents/Nu-Link3-Pro_User_Manual
          
          # 找出所有包含子資料夾的 .md 檔，依照字母/數字順序排列
          # 將它們合併，並在每個檔案結尾加上強制的「換頁標籤」與換行
          # ⚠️ 注意：統一輸出到「上一層目錄 (../)」，避免合併到一半把剛建好的檔案又吃進去
          find . -type f -name "*.md" | sort | while read -r file; do
            cat "$file"
            echo -e "\n\n<div style=\"page-break-after: always;\"></div>\n\n"
          done > ../merged_manual.md
          
          # 退回上一層目錄，開始將這份「巨無霸 Markdown」轉成 PDF
          cd ..
          md-to-pdf merged_manual.md
          
          # 搬移到最外層並重新命名
          mv merged_manual.pdf ../Nu-Link3-Pro_User_Manual.pdf

      # 5. 將打包好的 PDF 上傳為 GitHub Artifacts 供下載
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nu-Link3-Pro_User_Manual
          path: Nu-Link3-Pro_User_Manual.pdf
