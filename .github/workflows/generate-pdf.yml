name: Generate Nu-Link3-Pro Manual PDF (Pandoc)

on:
  push:
    branches: [ main ]
    paths:
      - 'Documents/Nu-Link3-Pro_User_Manual/**/*.md'
  workflow_dispatch: 

jobs:
  build-pdf-pandoc:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安裝 Pandoc, LaTeX 引擎, 中文語系套件 (解決 ctexhook.sty 遺失) 以及中文字型
      - name: Install Pandoc & LaTeX & CJK Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra texlive-lang-chinese
          sudo apt-get install -y fonts-noto-cjk

      # 轉換 Markdown 為 PDF
      - name: Convert with Pandoc
        run: |
          cd Documents/Nu-Link3-Pro_User_Manual
          
          # 找出所有 .md 檔案並依字母順序排列
          FILES=$(find . -type f -name "*.md" | sort)
          
          # 執行 Pandoc 轉換
          # --resource-path 用於往上層目錄尋找 media 資料夾內的圖片
          pandoc $FILES \
            -o ../../Nu-Link3-Pro_User_Manual.pdf \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK TC" \
            -V geometry:margin=1in \
            --toc \
            --number-sections \
            --resource-path=.:..:../..:../../..

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nu-Link3-Pro_User_Manual_Pandoc
          path: Nu-Link3-Pro_User_Manual.pdf
